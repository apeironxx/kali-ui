<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recon Module</title>
<style>
body{
margin:0;
background:#050505;
font-family:'JetBrains Mono', monospace;
color:white;
display:flex;
justify-content:center;
align-items:flex-start;
min-height:100vh;
}
/* TOP BAR */
.header{
position:fixed;
top:0;
left:0;
right:0;
padding:25px 40px;
border-bottom:1px solid rgba(255,255,255,0.06);
background:rgba(5,5,5,0.9);
backdrop-filter:blur(10px);
}
.header h1{
margin:0;
font-size:22px;
color:#00b4ff;
letter-spacing:2px;
}
.header p{
margin-top:6px;
color:rgba(255,255,255,0.4);
font-size:12px;
}
/* MAIN PANEL */
.container{
margin-top:120px;
width:85%;
max-width:1000px;
}
/* CARD WRAPPER */
.panel{
background:rgba(255,255,255,0.03);
border:1px solid rgba(0,180,255,0.15);
border-radius:18px;

padding:25px;
box-shadow:0 0 30px rgba(0,180,255,0.06);
}
/* BOX */
.box{
background:rgba(0,0,0,0.6);
border:1px solid rgba(255,255,255,0.06);
border-radius:14px;
padding:20px;
font-size:13px;
color:rgba(255,255,255,0.75);
margin-bottom:20px;
}
/* REPORT VIEW */
iframe{
width:100%;
height:420px;
border:1px solid rgba(255,255,255,0.08);
border-radius:12px;
background:black;
margin-bottom:20px;
}
/* BUTTON (now centered + prominent) */
.button{
display:block;
width:fit-content;
margin:0 auto;
padding:12px 18px;
border-radius:10px;
border:1px solid rgba(0,180,255,0.25);
color:#00b4ff;
text-decoration:none;
transition:0.2s;
}
.button:hover{
background:rgba(0,180,255,0.08);
transform:translateY(-2px);
}
</style>
</head>
<body>
<div class="header">
<h1>RECON MODULE</h1>
<p>Sanitized system reconnaissance output viewer</p>
</div>
<div class="container">
<div class="panel">
<div class="box">

Live SAFE report feed (sanitized)
</div>
<iframe src="../reports/recon_report.txt"></iframe>
<a class="button" href="../reports/recon_report.txt" target="_blank">
OPEN FULL REPORT
</a>
</div>
</div>
</body>
</html>
